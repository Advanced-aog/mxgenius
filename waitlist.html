<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MXGenius - Early Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0a0f;
            --card-bg: #12121a;
            --primary-blue: #3b82f6;
            --accent-orange: #f97316;
            --text-white: #ffffff;
            --text-gray: #9ca3af;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: radial-gradient(circle at center, #1a1a2e 0%, var(--bg-dark) 100%);
        }

        .back-link {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: var(--text-gray);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--text-white);
        }

        .form-container {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 1rem;
            border: 1px solid rgba(59, 130, 246, 0.2);
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--text-white), var(--primary-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            font-size: 1.1rem;
            color: var(--text-gray);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        input[type="email"] {
            width: 100%;
            padding: 1rem;
            border-radius: 0.5rem;
            border: 1px solid rgba(59, 130, 246, 0.3);
            background: rgba(10, 10, 15, 0.8);
            color: var(--text-white);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input[type="email"]::placeholder {
            color: rgba(156, 163, 175, 0.5);
        }

        input[type="email"]:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        button {
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary-blue), #2563eb);
            color: var(--text-white);
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }
        
        .success-message {
            display: none;
            color: #10b981;
            font-weight: 500;
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 0.5rem;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Return to Main Site</a>
    
    <div class="form-container">
        <h1>Thank You for Your Interest!</h1>
        <p>MXGenius is currently preparing to launch closed testing channels. Enter your email below, and we'll reach out when early access opens.</p>
        
        <form id="waitlist-form" action="#" onsubmit="event.preventDefault(); document.getElementById('waitlist-form').style.display='none'; document.getElementById('success-msg').style.display='block';">
            <input type="email" placeholder="Enter your email address" required>
            <button type="submit">Join the Waitlist</button>
        </form>
        
        <div id="success-msg" class="success-message">
            Thanks! You've been added to the list. We'll be in touch soon with next steps.
        </div>
    </div>
</body>
</html>
