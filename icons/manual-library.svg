<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Stack of documents - three offset pages -->
  <g id="document-stack">
    <!-- Back document -->
    <rect x="10" y="16" width="28" height="36" rx="1.5" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    
    <!-- Middle document (offset) -->
    <rect x="14" y="13" width="28" height="36" rx="1.5" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    
    <!-- Front document (offset more) -->
    <rect x="18" y="10" width="28" height="36" rx="1.5" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    
    <!-- Document lines to indicate text -->
    <line x1="24" y1="18" x2="40" y2="18" stroke="#3b82f6" stroke-width="1" stroke-linecap="round"/>
    <line x1="24" y1="23" x2="40" y2="23" stroke="#3b82f6" stroke-width="1" stroke-linecap="round"/>
    <line x1="24" y1="28" x2="40" y2="28" stroke="#3b82f6" stroke-width="1" stroke-linecap="round"/>
  </g>
  
  <!-- Magnifying glass overlay -->
  <g id="magnifying-glass" transform="translate(38, 32)">
    <!-- Circle (lens) -->
    <circle cx="0" cy="0" r="10" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    
    <!-- Handle -->
    <line x1="7" y1="7" x2="14" y2="14" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>