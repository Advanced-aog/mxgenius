<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Define stroke styles -->
  <defs>
    <style>
      .parts-stroke {
        stroke: #3b82f6;
        stroke-width: 1.5;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .parts-stroke-2 {
        stroke: #3b82f6;
        stroke-width: 1.2;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </defs>
  
  <!-- Main mechanical part (hexagonal component) -->
  <g transform="translate(32, 20)">
    <!-- Outer hexagon representing a mechanical component -->
    <polygon points="0,-10 8.66,-5 8.66,5 0,10 -8.66,5 -8.66,-5" class="parts-stroke"/>
    
    <!-- Inner detail lines for depth -->
    <line x1="0" y1="-5" x2="0" y2="5" class="parts-stroke-2"/>
    <line x1="-4" y1="-2.5" x2="4" y2="-2.5" class="parts-stroke-2"/>
    <line x1="-4" y1="2.5" x2="4" y2="2.5" class="parts-stroke-2"/>
  </g>
  
  <!-- Location pin pointer below -->
  <g transform="translate(32, 36)">
    <!-- Pin body -->
    <path d="M 0 0 C -6 0 -10 -4 -10 -10 C -10 -16 0 -26 0 -26 C 0 -26 10 -16 10 -10 C 10 -4 6 0 0 0 Z" class="parts-stroke"/>
    
    <!-- Pin dot center -->
    <circle cx="0" cy="-10" r="2.5" class="parts-stroke-2"/>
  </g>
  
  <!-- Search element (subtle magnifying glass accent) -->
  <g transform="translate(42, 42)">
    <!-- Magnifying glass circle -->
    <circle cx="0" cy="0" r="5" class="parts-stroke-2"/>
    <!-- Handle line -->
    <line x1="3.5" y1="3.5" x2="7" y2="7" class="parts-stroke-2"/>
  </g>
  
  <!-- Top accent line for visual balance -->
  <line x1="20" y1="8" x2="44" y2="8" class="parts-stroke-2" opacity="0.5"/>
</svg>