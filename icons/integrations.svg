<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" width="64" height="64">
  <!-- Background (optional, remove if you want transparent) -->
  <!-- <rect width="64" height="64" fill="#0f172a"/> -->
  
  <!-- Connection lines -->
  <g stroke="#3b82f6" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Lines connecting nodes -->
    <line x1="16" y1="32" x2="32" y2="20"/>
    <line x1="32" y1="20" x2="48" y2="32"/>
    <line x1="48" y1="32" x2="32" y2="44"/>
    <line x1="32" y1="44" x2="16" y2="32"/>
    <line x1="32" y1="20" x2="32" y2="44"/>
  </g>
  
  <!-- Node circles -->
  <g fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top node -->
    <circle cx="32" cy="20" r="3.5"/>
    
    <!-- Left node -->
    <circle cx="16" cy="32" r="3.5"/>
    
    <!-- Right node -->
    <circle cx="48" cy="32" r="3.5"/>
    
    <!-- Bottom node -->
    <circle cx="32" cy="44" r="3.5"/>
    
    <!-- Center node (smaller, subtle) -->
    <circle cx="32" cy="32" r="2.5"/>
  </g>
  
  <!-- Accent elements for modern feel -->
  <g stroke="#60a5fa" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6">
    <!-- Subtle flow indicators -->
    <circle cx="32" cy="20" r="5.5"/>
    <circle cx="16" cy="32" r="5.5"/>
    <circle cx="48" cy="32" r="5.5"/>
    <circle cx="32" cy="44" r="5.5"/>
  </g>
</svg>